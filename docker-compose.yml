version: "3.8"

services:
  db:
    image: postgres:15
    container_name: zorvyn-finance-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: zorvyn-finance-backend
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "3000:3000"
    command: sh -c "sleep 5 && npx prisma migrate deploy --schema=src/prisma/schema.prisma && npm run db:seed && npm run start"

volumes:
  postgres_data:
